<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: #f8f7f5;
    color: #1a1a2e;
    overflow-x: hidden;
  }
  #root { min-height: 100vh; }

  /* Page transitions */
  .page-enter { animation: pageIn 0.4s cubic-bezier(0.22,1,0.36,1) both; }
  .page-exit { animation: pageOut 0.25s ease-in both; }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(32px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes pageOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-16px); }
  }

  /* Hover lift for cards */
  .card-lift {
    transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), box-shadow 0.25s ease;
    cursor: pointer;
  }
  .card-lift:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 24px 48px rgba(0,0,0,0.14);
  }
  .card-lift:active { transform: translateY(-2px) scale(0.99); }

  /* Ripple btn */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 32px; border-radius: 100px; border: none; cursor: pointer;
    font-family: inherit; font-size: 16px; font-weight: 800;
    transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .btn-primary:active { transform: scale(0.97); }

  /* Back button */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 20px; border-radius: 100px;
    border: 2px solid rgba(0,0,0,0.12); background: white;
    font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all 0.2s;
  }
  .back-btn:hover { background: #f0f0f0; transform: translateX(-4px); }

  /* Feature pill */

    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 100px;
    font-size: 13px; font-weight: 700;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

            <div style={{ fontSize: 13, color: '#888', fontWeight: 500 }}>バグ報告・機能リクエストなどお気軽にどうぞ</div>
          </div>
          <a
            href="https://forms.gle/44vv4Db2T1MqpQ7r8"
            target="_blank"
            rel="noopener noreferrer"
            style={{ textDecoration: 'none' }}
          >
            <button className="btn-primary" style={{ background: app.heroGrad, color: 'white', flexShrink: 0 }}>
              📩 お問い合わせはこちら
            </button>
          </a>
        </div>

        {/* Back */}
        <div style={{ textAlign: 'center', marginTop: 24, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 16 }}>
          <button className="back-btn" onClick={onBack}>
            ← アプリ一覧に戻る
          </button>
          {app.privacyUrl && (
            <a href={app.privacyUrl} style={{ fontSize: 13, color: '#aaa', fontWeight: 700, textDecoration: 'none' }}>
              プライバシーポリシー
            </a>
          )}
        </div>
      </div>
    </div>);

}

/* ── App Root ── */
function App() {
  const [page, setPage] = useState(() => {
    return localStorage.getItem('hp_page') || 'top';
  });

  const navigate = (to) => {
    localStorage.setItem('hp_page', to);
    setPage(to);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  if (page !== 'top') {
    return <DetailPage appId={page} onBack={() => navigate('top')} />;
  }
  return <TopPage onSelect={(id) => navigate(id)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
